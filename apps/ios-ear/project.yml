name: VegaEariOS
options:
  bundleIdPrefix: me.pasynkov
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ru
  createIntermediateGroups: true

packages:
  EarProtocol:
    path: ../../packages/ear-protocol/swift
  EarCore:
    path: ../../packages/ear-core
  EarUI:
    path: ../../packages/ear-ui

targets:
  VegaEariOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VegaEariOS
        excludes:
          - "Info.plist"
    resources:
      - path: VegaEariOS/Settings.bundle
        buildPhase: resources
    info:
      path: VegaEariOS/Info.plist
      properties:
        CFBundleDevelopmentRegion: ru
        CFBundleDisplayName: Вега
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSMicrophoneUsageDescription: "Vega Ear слушает голосовые команды, пока приложение открыто."
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.pasynkov.VegaEariOS
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: EarProtocol
        product: EarProtocol
      - package: EarCore
        product: EarCore
      - package: EarUI
        product: EarUI
